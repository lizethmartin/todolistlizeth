name: iOS Build

on:
  push:
    branches: [feature/android-ios-config]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Ionic y Cordova
        run: npm install -g @ionic/cli cordova
      
      - name: Install CocoaPods
        run: sudo gem install cocoapods
      
      - name: Build Angular
        run: ionic build
      
      - name: Add iOS platform
        run: |
          cordova platform remove ios || true
          cordova platform add ios

      - name: Fix deployment target
        run: |
          find platforms/ios -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} \;
      
      - name: Build iOS Simulator
        run: cordova build ios --emulator

      - name: Find app file
        run: find platforms/ios -name "*.app" -type d 2>/dev/null || echo "No .app found"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ios-simulator
          path: platforms/ios/build/Debug-iphonesimulator/
          if-no-files-found: warn

      - name: Find app file
        run: find platforms/ios/build -name "*.app" -type d

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ios-simulator
          path: platforms/ios/build/emulator/
          if-no-files-found: warn
      
      - name: Run simulator and record
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone SE (3rd generation)" | head -1 | grep -E -o -i "([0-9a-f]{8}-([0-9a-f]{4}-){3}[0-9a-f]{12})")
          xcrun simctl boot $UDID || true
          sleep 15
          APP_PATH=$(find platforms/ios/build/Debug-iphonesimulator -name "*.app" -type d | head -1)
          xcrun simctl install $UDID "$APP_PATH"
          xcrun simctl launch $UDID io.ionic.starter
          xcrun simctl io $UDID recordVideo --type=mp4 "$GITHUB_WORKSPACE/demo.mp4" &
          sleep 25
          kill %1 || true

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: ios-demo-video
          path: demo.mp4